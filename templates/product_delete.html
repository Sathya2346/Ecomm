{% extends 'base.html' %}

{% block title %}Product Delete{% endblock %}

{% block content %}
    <h2>Product Delete</h2>
    <p>Are you sure you want to delete the product "{{ product.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>
{% endblock %}
